[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  targetPort = 5173

[functions."warmContent"]
  schedule = "@hourly"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ─── HTTP Cache Headers ────────────────────────────────────────────────────────
# Vite appends a content-hash to every JS/CSS filename (e.g. index-Bk3xQp8.js)
# so these assets are safe to cache forever — browsers only re-download when
# the file actually changes (new deploy = new hash = new URL).

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts are also hashed and never change once published.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images in /images/ are not hashed, cache for 7 days and allow revalidation.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# The HTML shell must never be cached — it's what loads the hashed chunks.
# For an SPA this applies to every route that rewrites to index.html, not just
# the literal /index.html path. Otherwise deep links like /category/politics can
# cache old HTML that points at deleted chunk filenames after a new deploy.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Netlify function responses — let the in-memory cache on the function handle
# freshness; tell the CDN/browser not to cache the JSON directly.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200

[[redirects]]
  from = "/@react-refresh"
  to = "/@react-refresh"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
