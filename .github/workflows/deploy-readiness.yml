name: Deploy Readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: Netlify preview or production URL to smoke test
        required: false
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run focused header regression
        run: npm test -- Header.test.jsx

  deploy-env-gate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SESSION_TOKEN_PEPPER: ${{ secrets.SESSION_TOKEN_PEPPER }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}
      RSS_APP_BUNDLE_FEED_URL: ${{ secrets.RSS_APP_BUNDLE_FEED_URL }}
      RSS_APP_BUNDLE_SOURCE: ${{ secrets.RSS_APP_BUNDLE_SOURCE }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      SOCIAL_RSS_FEEDS: ${{ secrets.SOCIAL_RSS_FEEDS }}
      VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
      VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
      VITE_PERPLEXITY_API_KEY: ${{ secrets.VITE_PERPLEXITY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NETLIFY_BLOBS_SITE_ID: ${{ secrets.NETLIFY_BLOBS_SITE_ID }}
      NETLIFY_BLOBS_TOKEN: ${{ secrets.NETLIFY_BLOBS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deployment environment
        run: npm run verify:deploy-env

  smoke-netlify-deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.smoke_base_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test Netlify deploy
        run: npm run smoke:netlify-preview -- ${{ inputs.smoke_base_url }}